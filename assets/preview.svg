<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ddcff"/>
      <stop offset="1" stop-color="#e8f7ff"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6aa05a"/>
      <stop offset="1" stop-color="#4a7440"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="500" fill="url(#sky)"/>
  <circle cx="1060" cy="90" r="46" fill="#fff3b0" opacity="0.9"/>
  <ellipse cx="250" cy="110" rx="70" ry="26" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="300" cy="125" rx="55" ry="22" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="780" cy="80" rx="60" ry="22" fill="#ffffff" opacity="0.75"/>

  <!-- rolling hills (sum-of-sines profile, like Config.HeightAt) -->
  <path d="M0,340 C100,290 200,430 300,365 C400,300 500,450 600,375 C700,300 800,440 900,360 C1000,295 1100,405 1200,355 L1200,500 L0,500 Z"
        fill="url(#hill)" stroke="#3c6234" stroke-width="4"/>

  <!-- fuel cans -->
  <g>
    <rect x="289" y="332" width="22" height="28" rx="3" fill="#dc3732"/>
    <rect x="293" y="336" width="6" height="9" rx="1" fill="#ff8a6a"/>
    <rect x="889" y="330" width="22" height="28" rx="3" fill="#dc3732"/>
    <rect x="893" y="334" width="6" height="9" rx="1" fill="#ff8a6a"/>
  </g>

  <!-- buggy (sits in the dip near x=600) -->
  <g transform="translate(600,372) rotate(-6)">
    <circle cx="-38" cy="20" r="24" fill="#141414"/>
    <circle cx="-38" cy="20" r="9" fill="#5a5a5a"/>
    <circle cx="40" cy="20" r="24" fill="#141414"/>
    <circle cx="40" cy="20" r="9" fill="#5a5a5a"/>
    <rect x="-58" y="-12" width="116" height="30" rx="8" fill="#285ad2"/>
    <rect x="-18" y="-30" width="52" height="22" rx="6" fill="#5a8af0"/>
    <rect x="-12" y="-26" width="18" height="14" rx="3" fill="#bcd6ff"/>
    <rect x="12" y="-26" width="18" height="14" rx="3" fill="#bcd6ff"/>
  </g>

  <!-- HUD: distance / best / speed (top-left) -->
  <text x="40" y="62" fill="#ffffff" font-size="44" font-weight="700" style="paint-order:stroke" stroke="#000" stroke-width="1.5" stroke-opacity="0.4">248 m</text>
  <text x="42" y="92" fill="#ffd700" font-size="22" font-weight="700">Best: 412 m</text>
  <text x="42" y="118" fill="#b4dcff" font-size="18" font-weight="700">Speed: 73</text>

  <!-- HUD: fuel bar (top-right) -->
  <rect x="938" y="28" width="224" height="28" rx="6" fill="#1e1e1e" opacity="0.8"/>
  <rect x="938" y="28" width="150" height="28" rx="6" fill="#46c85a"/>
  <text x="1050" y="48" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">FUEL  68</text>

  <!-- hint -->
  <text x="600" y="476" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle" opacity="0.92">W / Up = gas&#160;&#160;&#160;&#160;S / Down = reverse&#160;&#160;&#160;&#160;R = respawn</text>

  <!-- title -->
  <text x="600" y="210" fill="#ffffff" font-size="64" font-weight="800" text-anchor="middle" opacity="0.18">HILL CLIMB</text>
</svg>
